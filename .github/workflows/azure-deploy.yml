name: 🚀 Deploy Healthcare.Server to Azure

# Trigger: tự động deploy khi push lên nhánh main
on:
  push:
    branches: [ main ]
    paths:
      - 'NT106/Healthcare.Server/**'  # Chỉ chạy khi có thay đổi ở Server
  workflow_dispatch:                   # Cho phép chạy thủ công trên GitHub UI

# ─────────────────────────────────────────
# Các biến dùng chung cho toàn bộ workflow
# ─────────────────────────────────────────
env:
  AZURE_WEBAPP_NAME: healthcare-server-nt10631    # Tên App Service trên Azure
  PROJECT_PATH: 'NT106/Healthcare.Server/Healthcare.Server.csproj'
  DOTNET_VERSION: '8.0.x'
  PUBLISH_DIR: './publish-output'

jobs:
  # ═══════════════════════════════════════
  # JOB 1: Build & Test
  # ═══════════════════════════════════════
  build:
    name: 🔨 Build & Publish
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      # 2. Cài đặt .NET 8
      - name: ⚙️ Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Cache NuGet packages (tăng tốc build lần sau)
      - name: 📦 Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 4. Restore dependencies
      - name: 🔄 Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # 5. Build project (Release mode)
      - name: 🔨 Build (Release)
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # 6. Publish (tạo artifact để deploy)
      - name: 📤 Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --output ${{ env.PUBLISH_DIR }} \
            --no-build

      # 7. Upload artifact để job deploy dùng
      - name: ⬆️ Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthcare-server-build
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 3

  # ═══════════════════════════════════════
  # JOB 2: Deploy lên Azure
  # ═══════════════════════════════════════
  deploy:
    name: 🚀 Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build           # Chỉ chạy sau khi build thành công
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      # 1. Download artifact từ job build
      - name: ⬇️ Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: healthcare-server-build
          path: ${{ env.PUBLISH_DIR }}

      # 2. Deploy lên Azure App Service
      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      # 3. Thông báo kết quả
      - name: ✅ Deploy successful
        run: |
          echo "✅ Deployed successfully!"
          echo "🌐 URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "📝 Swagger: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/swagger"
